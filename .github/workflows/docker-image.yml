name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image Tag (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
        type: string

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 951013217897.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: simple-java-app
  NAMESPACE: devops-demo
  RELEASE_NAME: simple-java-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Build and Test
        run: mvn clean package
      
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
      - name: Debug OIDC Token
        run: |
          echo "Checking OIDC token..."
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "Token audience: $(echo $TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | jq -r '.aud')"
          echo "Token subject: $(echo $TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | jq -r '.sub')"      
      
      - name: Configure AWS credentials using IAM Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::951013217897:role/Git-hub
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.event.inputs.image_tag }} .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.event.inputs.image_tag }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
      
      - name: Push Docker Image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.event.inputs.image_tag }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Copy Helm charts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "helm-chart/"
          target: "/home/ubuntu/"
          strip_components: 0     
      
      - name: Deploy to KIND
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            
            # Pull the image with the specified tag
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.event.inputs.image_tag }}
            
            # Load into Kind cluster
            kind load docker-image ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.event.inputs.image_tag }} --name devops-kind-cluster
            
            # Deploy with Helm using the image tag
            helm upgrade --install ${{ env.RELEASE_NAME }} /home/ubuntu/helm-chart \
              --namespace ${{ env.NAMESPACE }} \
              --create-namespace \
              --set image.repository=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }} \
              --set image.tag=${{ github.event.inputs.image_tag }} \
              --set image.pullPolicy=IfNotPresent \
              --wait \
              --timeout 5m
            
            # Verify deployment
            kubectl get pods -n ${{ env.NAMESPACE }}
            kubectl get svc -n ${{ env.NAMESPACE }}
